name: Publish

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtualenv and install tools
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install ruff mypy maturin polars

      - name: Ruff lint
        run: |
          . .venv/bin/activate
          ruff check python/ tests/

      - name: Ruff format check
        run: |
          . .venv/bin/activate
          ruff format --check python/ tests/

      - name: Mypy
        run: |
          . .venv/bin/activate
          maturin develop --release
          mypy python/trucktrack

      - name: Check pyproject.toml and Cargo.toml versions match
        run: |
          PY_VER=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          RS_VER=$(grep -E '^version[[:space:]]*=' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "pyproject.toml: $PY_VER"
          echo "Cargo.toml:     $RS_VER"
          if [ "$PY_VER" != "$RS_VER" ]; then
            echo "::error::version mismatch between pyproject.toml ($PY_VER) and Cargo.toml ($RS_VER)"
            exit 1
          fi

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtualenv and install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "maturin>=1.7,<2.0" pytest pytest-benchmark polars

      - name: Create virtualenv and install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install "maturin>=1.7,<2.0" pytest pytest-benchmark polars

      - name: Build and install (Unix)
        if: runner.os != 'Windows'
        run: |
          . .venv/bin/activate
          maturin develop

      - name: Build and install (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate
          maturin develop

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: |
          . .venv/bin/activate
          pytest tests/ -v

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate
          pytest tests/ -v

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-latest is arm64. The macos-13 (x86_64) runner has been retired
        # by GitHub Actions, so Intel Mac users fall back to building from the
        # sdist (requires a Rust toolchain). Reintroduce a paid x86_64 macOS
        # runner here if Intel Mac wheels become a real requirement.
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # abi3-py311 in Cargo.toml means one wheel per OS covers Python 3.11+.
          # -i python3.11 forces maturin to tag the wheel cp311-abi3 (otherwise
          # the manylinux container picks Python 3.8 and produces a cp38 wheel
          # that pip refuses to use on Python 3.11+).
          args: --release --out dist/ -i python3.11
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    needs: [build-wheels]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [build-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
