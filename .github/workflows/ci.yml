name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv and install tools
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install ruff mypy maturin polars orjson

      - name: Ruff lint
        run: |
          . .venv/bin/activate
          ruff check python/ tests/

      - name: Ruff format check
        run: |
          . .venv/bin/activate
          ruff format --check python/ tests/

      - name: Mypy
        run: |
          . .venv/bin/activate
          maturin develop --release
          mypy python/trucktrack

      - name: Check pyproject.toml and Cargo.toml versions match
        run: |
          PY_VER=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          RS_VER=$(grep -E '^version[[:space:]]*=' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "pyproject.toml: $PY_VER"
          echo "Cargo.toml:     $RS_VER"
          if [ "$PY_VER" != "$RS_VER" ]; then
            echo "::error::version mismatch between pyproject.toml ($PY_VER) and Cargo.toml ($RS_VER)"
            exit 1
          fi

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "maturin>=1.7,<2.0" pytest pytest-benchmark polars

      - name: Build and install
        run: |
          . .venv/bin/activate
          maturin develop

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v
